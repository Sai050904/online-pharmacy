<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            margin:0;
        }

        h1{
            text-align:center;
            color:#1e88e5;
            padding:20px;
            font-size:50px;
        }

        .cart-container{
            width:70%;
            margin:auto;
        }

        .cart-item{
            background:white;
            padding:25px;
            margin:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .cart-item h2{
            margin-bottom:15px;
        }

        .cart-item h3{
            color:#1e88e5;
        }

        .remove-btn{
            background:red;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            margin-top:15px;
            font-size:16px;
        }

        .remove-btn:hover{
            background:darkred;
        }

        .total{
            text-align:center;
            font-size:35px;
            margin-top:30px;
            color:#1e88e5;
            margin-bottom:50px;
        }

    </style>

</head>

<body>

<h1>Your Cart</h1>

<div class="cart-container" id="cartItems">

</div>

<div class="total" id="totalPrice">

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart()
{
    let cartHTML = "";

    let total = 0;

    cart.forEach(function(item,index){

        total += item.price;

        cartHTML += `
        
        <div class="cart-item">

            <h2>${item.name}</h2>

            <h3>₹${item.price}</h3>

            <button class="remove-btn"
            onclick="removeItem(${index})">
            Remove
            </button>

        </div>

        `;
    });

    document.getElementById("cartItems").innerHTML = cartHTML;

    document.getElementById("totalPrice").innerHTML =
    "Total Amount: ₹" + total;
}

function removeItem(index)
{
    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    displayCart();
}

displayCart();

</script>

</body>
</html>
