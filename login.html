<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f7fb;
        }

        .login-box{
            width:350px;
            background:white;
            padding:40px;
            margin:100px auto;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            color:#1e88e5;
            margin-bottom:30px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#1e88e5;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="login-box">

<h2>User Login</h2>

<input type="email" id="email"
placeholder="Enter Email">

<input type="password" id="password"
placeholder="Enter Password">

<br><br>

<button onclick="login()">
Login
</button>

</div>

<script>

function login()
{
    let email =
    document.getElementById("email").value;

    localStorage.setItem("isLoggedIn","true");

    localStorage.setItem("userEmail",email);

    window.location.href="index.html";
}

</script>

</body>
</html>
